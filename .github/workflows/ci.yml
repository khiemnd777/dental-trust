name: CI

on:
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: 22.23.1
  PNPM_VERSION: 11.12.0

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: node scripts/check-placeholders.mjs
      - run: pnpm lint
      - run: pnpm typecheck

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  integration:
    name: Integration and migration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16.13-alpine3.23
        env:
          POSTGRES_USER: dental_trust
          POSTGRES_PASSWORD: dental_trust_ci_only
          POSTGRES_DB: dental_trust_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dental_trust -d dental_trust_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7.4.9-alpine3.21
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://dental_trust:dental_trust_ci_only@localhost:5432/dental_trust_ci?schema=public
      DIRECT_DATABASE_URL: postgresql://dental_trust:dental_trust_ci_only@localhost:5432/dental_trust_ci?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-only-auth-secret-with-at-least-32-characters
      FIELD_ENCRYPTION_KEY: ci-only-field-secret-with-at-least-32-characters
      PAYMENT_ADAPTER: development
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm db:seed
      - run: pnpm test:integration

  end-to-end:
    name: End-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16.13-alpine3.23
        env:
          POSTGRES_USER: dental_trust
          POSTGRES_PASSWORD: dental_trust_e2e_only
          POSTGRES_DB: dental_trust_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dental_trust -d dental_trust_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7.4.9-alpine3.21
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://dental_trust:dental_trust_e2e_only@localhost:5432/dental_trust_e2e?schema=public
      DIRECT_DATABASE_URL: postgresql://dental_trust:dental_trust_e2e_only@localhost:5432/dental_trust_e2e?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: e2e-only-auth-secret-with-at-least-32-characters
      FIELD_ENCRYPTION_KEY: e2e-only-field-secret-with-at-least-32-characters
      PAYMENT_ADAPTER: development
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      E2E_REAL_API: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm db:seed
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: |
            playwright-report
            test-results
          retention-days: 7

  production-build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build

  supply-chain:
    name: Dependency and secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit:dependencies
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  containers:
    name: Container ${{ matrix.app }}
    needs: production-build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        app: [web, api, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.app }}.Dockerfile
          push: false
          build-args: |
            VERSION=${{ github.sha }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
