name: dental-trust

services:
  postgres:
    image: postgres:16.13-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dental_trust}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dental_trust_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-dental_trust}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - dental-trust

  redis:
    image: redis:7.4.9-alpine3.21
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true
    networks:
      - dental-trust

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dentaltrust}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dentaltrust-dev-only}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - dental-trust

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: 'no'
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dentaltrust}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dentaltrust-dev-only}
      S3_BUCKET: ${S3_BUCKET:-dental-trust-private}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
        mc anonymous set none "local/$${S3_BUCKET}"
    security_opt:
      - no-new-privileges:true
    networks:
      - dental-trust

  mailpit:
    image: axllent/mailpit:v1.30.4
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: '1'
      MP_SMTP_AUTH_ALLOW_INSECURE: '1'
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
      - '${MAILPIT_HTTP_PORT:-8025}:8025'
    healthcheck:
      test: ['CMD', '/mailpit', 'readyz']
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true
    networks:
      - dental-trust

  clamav:
    image: clamav/clamav:1.4.5-debian13-slim
    restart: unless-stopped
    ports:
      - '${CLAMAV_PORT:-3310}:3310'
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ['CMD-SHELL', 'clamdscan --ping 1 >/dev/null 2>&1']
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
    security_opt:
      - no-new-privileges:true
    networks:
      - dental-trust

volumes:
  postgres-data:
  redis-data:
  minio-data:
  clamav-data:

networks:
  dental-trust:
    driver: bridge
